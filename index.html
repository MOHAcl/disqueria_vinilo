<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 <title>Disquería de Vinilo</title>

 <!-- Bootstrap 5 para responsividad -->
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

 <!-- Tus estilos personalizados -->
 <link rel="stylesheet" href="css/style.css" />
</head>
<body>

 <!-- Vue.js 3 monta aquí -->
 <div id="app">
 <h1>{{ titulo }}</h1>
 
 <!-- Estado de carga -->
 <div v-if="cargando" class="text-center my-5">
 <div class="spinner-border text-dark" role="status"></div>
 <p>Cargando catálogo...</p>
 </div>

 <!-- Estado de error -->
 <div v-else-if="error" class="alert alert-danger m-4">
 {{ error }}
 <button @click="cargarDiscos">Reintentar</button>
 </div>
 <!-- Catálogo cargado -->
 <div v-else class="row g-4">
 <div v-for="disco in discosFiltrados" :key="disco.id" class="col-12 col-md-6 col-lg-4">
 <div class="card h-100 shadow-sm">
    <img :src="disco.imagen" :alt="disco.album" class="card-img-top" />
 <div class="card-body">
 <h5 class="card-title">{{ disco.album }}</h5>
 <p class="card-text">{{ disco.artista }}</p>
 <span class="badge bg-secondary">{{ disco.genero.toUpperCase() }}</span>
 <p class="mt-2 fw-bold">${{ disco.precio.toLocaleString('es-CL') }}</p>
 </div>
 </div>
 </div>
 </div>
</div>


<!-- Vue.js 3 CDN (sin instalación) -->
 <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
 <!-- Tu lógica -->
 <script src="js/app.js"></script>

</body>
</html>
